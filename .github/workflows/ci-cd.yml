name: CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set MLflow tracking
        run: |
          export MLFLOW_TRACKING_URI=file:./mlruns

      - name: Run training pipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python pipeline/training_pipeline.py

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t jesrin123/mlops-pipeline:${{ github.sha }} .
          docker tag jesrin123/mlops-pipeline:${{ github.sha }} jesrin123/mlops-pipeline:latest

      - name: Push Docker image
        run: |
          docker push jesrin123/mlops-pipeline:${{ github.sha }}
          docker push jesrin123/mlops-pipeline:latest